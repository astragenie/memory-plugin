# Cross-OS CI for FEAT-4a v0.5.0 — Ubuntu/macOS/Windows × Bun '1.3'.
# Triggered on every push + PRs to main. Stage 4 of plugin Phase 3.
# Matrix: os (ubuntu-latest, macos-latest, windows-latest) × bun-version ('1.3').
# Pinned per R10 architect review — 'latest' auto-update was #1 6-month footgun for Windows subprocess handling.
# Gates commits: 06d20a8 (wire_version), 4db957f (doctor), 5fb99e6 (wire-flow E2E).

name: test-xplat

on:
  push:
    branches:
      - main
      - "feat/**"
  pull_request:
    branches:
      - main
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

jobs:
  bun-tests:
    name: Tests (bun ${{ matrix.bun-version }}, ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
        bun-version: ['1.3']
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: ${{ matrix.bun-version }}
      - name: Install dependencies
        run: bun install --frozen-lockfile
      - name: Type-check
        run: bun run typecheck
      - name: Run tests
        run: bun run test
